services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: pet_vet_insurance_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  ai:
    build: ./ai-engine
    ports:
      - "7000:7000"

  backend:
    build: ./backend
    depends_on:
      - mysql
      - ai
    environment:
      ConnectionStrings__DefaultConnection: server=mysql;port=3306;database=pet_vet_insurance_db;user=root;password=;
      Ai__BaseUrl: http://ai:7000
    ports:
      - "5000:5000"

volumes:
  mysql_data:
